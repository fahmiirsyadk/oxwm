# ─── Backend ──────────────────────────────────────────────────────────
# xrender = widest compat, lower CPU. Use glx only if you need blur.
backend = "xrender";
vsync = true;
use-damage = true;

# ─── Shadows ──────────────────────────────────────────────────────────
# Keep window shadows but skip them on things that look bad with one
# (notifications, conky, transparent apps, etc.)
shadow = true;
shadow-radius = 12;
shadow-offset-x = -7;
shadow-offset-y = -7;
shadow-opacity = 0.4;
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g ?= 'Notify-osd'",
    "class_g = 'Cairo-clock'",
    "_GTK_FRAME_EXTENTS@:c",
    "class_g = 'firefox' && argb",
];

# ─── Fades ────────────────────────────────────────────────────────────
# DISABLED — no fade-in/out animations. Big CPU saver and removes
# the annoying re-render-on-every-step behaviour.
fading = false;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5;
fade-exclude = [];

# ─── Transparency / opacity ──────────────────────────────────────────
inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 0.7;
inactive-opacity-override = false;
opacity-rule = [
    "95:class_g = 'urxvt'",
    "95:class_g = 'xterm'",
    "90:name = 'Volume Control'",
];

# ─── Corners ──────────────────────────────────────────────────────────
corner-radius = 6;

# ─── Misc ─────────────────────────────────────────────────────────────
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
use-ewmh-active-win = true;

# Keep everything composited (needed for per-window opacity rules).
# Set to true if you don't need transparency and want fullscreen FPS.
unredir-if-possible = false;
